<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Clea</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      background: #0a0a0a;
      color: #d8d8d8;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      height: 100dvh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }

    /* ── Gate screen ── */
    #gate {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 24px;
      padding: 32px;
      max-width: 360px;
      width: 100%;
    }
    #gate img {
      width: 80px; height: 80px;
      border-radius: 50%;
      border: 2px solid #222;
    }
    #gate h1 { font-size: 1.3rem; font-weight: 500; color: #fff; }
    #gate p { font-size: 0.85rem; color: #666; text-align: center; line-height: 1.5; }
    #gate input {
      width: 100%;
      background: #111;
      border: 1px solid #222;
      border-radius: 8px;
      color: #d8d8d8;
      font-size: 0.95rem;
      padding: 12px 14px;
      outline: none;
      transition: border-color 0.15s;
    }
    #gate input:focus { border-color: #444; }
    #gate input.error { border-color: #622; }
    #gate button {
      width: 100%;
      background: #1a1a1a;
      border: 1px solid #333;
      border-radius: 8px;
      color: #d8d8d8;
      font-size: 0.9rem;
      padding: 12px;
      cursor: pointer;
      transition: background 0.15s;
    }
    #gate button:hover { background: #222; }
    #gate .hint { font-size: 0.75rem; color: #444; }

    /* ── Chat screen ── */
    #chat {
      display: none;
      flex-direction: column;
      width: 100%;
      max-width: 680px;
      height: 100dvh;
      padding: 0;
    }

    #chat-header {
      display: flex;
      align-items: center;
      gap: 12px;
      padding: 16px 20px;
      border-bottom: 1px solid #111;
      flex-shrink: 0;
    }
    #chat-header img {
      width: 36px; height: 36px;
      border-radius: 50%;
    }
    #chat-header .name { font-size: 0.95rem; font-weight: 500; color: #fff; }
    #chat-header .sub { font-size: 0.75rem; color: #555; }

    #messages {
      flex: 1;
      overflow-y: auto;
      padding: 24px 20px;
      display: flex;
      flex-direction: column;
      gap: 16px;
    }
    #messages::-webkit-scrollbar { width: 4px; }
    #messages::-webkit-scrollbar-track { background: transparent; }
    #messages::-webkit-scrollbar-thumb { background: #222; border-radius: 2px; }

    .msg {
      display: flex;
      flex-direction: column;
      max-width: 80%;
    }
    .msg.user { align-self: flex-end; align-items: flex-end; }
    .msg.assistant { align-self: flex-start; align-items: flex-start; }

    .bubble {
      padding: 10px 14px;
      border-radius: 16px;
      font-size: 0.9rem;
      line-height: 1.5;
      white-space: pre-wrap;
      word-break: break-word;
    }
    .msg.user .bubble {
      background: #1e1e1e;
      border-bottom-right-radius: 4px;
      color: #d8d8d8;
    }
    .msg.assistant .bubble {
      background: #141414;
      border: 1px solid #1e1e1e;
      border-bottom-left-radius: 4px;
      color: #c8c8c8;
    }
    .msg-label {
      font-size: 0.68rem;
      color: #444;
      margin-bottom: 4px;
      padding: 0 4px;
    }

    .typing .bubble {
      color: #555;
      font-style: italic;
    }

    #input-row {
      display: flex;
      align-items: flex-end;
      gap: 10px;
      padding: 16px 20px;
      border-top: 1px solid #111;
      flex-shrink: 0;
    }
    #user-input {
      flex: 1;
      background: #111;
      border: 1px solid #1e1e1e;
      border-radius: 12px;
      color: #d8d8d8;
      font-size: 0.9rem;
      padding: 10px 14px;
      resize: none;
      outline: none;
      max-height: 140px;
      font-family: inherit;
      line-height: 1.4;
      transition: border-color 0.15s;
    }
    #user-input:focus { border-color: #333; }
    #user-input::placeholder { color: #444; }

    #send-btn {
      background: #1a1a1a;
      border: 1px solid #2a2a2a;
      border-radius: 10px;
      color: #888;
      width: 40px; height: 40px;
      cursor: pointer;
      font-size: 1.1rem;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.15s;
      flex-shrink: 0;
    }
    #send-btn:hover:not(:disabled) { background: #222; color: #d8d8d8; }
    #send-btn:disabled { opacity: 0.3; cursor: not-allowed; }
  </style>
</head>
<body>

<!-- Gate -->
<div id="gate">
  <img src="https://cdn.discordapp.com/avatars/1479294832676442173/8d07b519e4971a79805695f5a624d623.png" alt="Clea">
  <h1>Clea</h1>
  <p>Answer one question to continue.</p>
  <div style="width:100%">
    <p style="font-size:0.85rem;color:#888;margin-bottom:8px;">What is the last name of my creator?</p>
    <input type="text" id="gate-input" placeholder="Answer..." autocomplete="off" />
  </div>
  <button onclick="checkGate()">Continue →</button>
  <span class="hint">case insensitive</span>
</div>

<!-- Chat -->
<div id="chat">
  <div id="chat-header">
    <img src="https://cdn.discordapp.com/avatars/1479294832676442173/8d07b519e4971a79805695f5a624d623.png" alt="Clea">
    <div>
      <div class="name">Clea</div>
      <div class="sub">AI · BauerSoft</div>
    </div>
  </div>
  <div id="messages"></div>
  <div id="input-row">
    <textarea id="user-input" rows="1" placeholder="Message Clea…"></textarea>
    <button id="send-btn" onclick="sendMessage()">↑</button>
  </div>
</div>

<script>
  const SESSION_ID = crypto.randomUUID();
  let busy = false;

  // ── Gate ──────────────────────────────────────────────────────────────────
  document.getElementById('gate-input').addEventListener('keydown', e => {
    if (e.key === 'Enter') checkGate();
  });

  function checkGate() {
    const val = document.getElementById('gate-input').value.trim().toLowerCase();
    if (val === 'bauerle') {
      document.getElementById('gate').style.display = 'none';
      document.getElementById('chat').style.display = 'flex';
      addMessage('assistant', 'Hello. Who are you, and what brings you here?');
      document.getElementById('user-input').focus();
    } else {
      const input = document.getElementById('gate-input');
      input.classList.add('error');
      input.value = '';
      input.placeholder = 'Try again.';
      setTimeout(() => { input.classList.remove('error'); input.placeholder = 'Answer...'; }, 1500);
    }
  }

  // ── Chat ──────────────────────────────────────────────────────────────────
  function addMessage(role, text) {
    const msgs = document.getElementById('messages');
    const div = document.createElement('div');
    div.className = `msg ${role}`;
    const label = document.createElement('div');
    label.className = 'msg-label';
    label.textContent = role === 'user' ? 'you' : 'clea';
    const bubble = document.createElement('div');
    bubble.className = 'bubble';
    bubble.textContent = text;
    div.appendChild(label);
    div.appendChild(bubble);
    msgs.appendChild(div);
    msgs.scrollTop = msgs.scrollHeight;
    return div;
  }

  function addTyping() {
    const div = addMessage('assistant', 'thinking…');
    div.classList.add('typing');
    return div;
  }

  async function sendMessage() {
    if (busy) return;
    const input = document.getElementById('user-input');
    const text = input.value.trim();
    if (!text) return;

    input.value = '';
    input.style.height = 'auto';
    busy = true;
    document.getElementById('send-btn').disabled = true;

    addMessage('user', text);
    const typingEl = addTyping();

    try {
      const resp = await fetch('/public/chat', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ sessionId: SESSION_ID, message: text })
      });
      const data = await resp.json();
      typingEl.remove();
      addMessage('assistant', data.reply || 'Something went wrong.');
    } catch (e) {
      typingEl.remove();
      addMessage('assistant', 'Connection error. Try again.');
    }

    busy = false;
    document.getElementById('send-btn').disabled = false;
    input.focus();
  }

  // Auto-resize textarea
  document.getElementById('user-input').addEventListener('input', function() {
    this.style.height = 'auto';
    this.style.height = Math.min(this.scrollHeight, 140) + 'px';
  });
  document.getElementById('user-input').addEventListener('keydown', e => {
    if (e.key === 'Enter' && !e.shiftKey) { e.preventDefault(); sendMessage(); }
  });
</script>
</body>
</html>
